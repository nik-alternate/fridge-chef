<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Background -->
  <rect width="400" height="400" fill="#0d0d0d"/>

  <!-- POT BODY — bold simple shape -->
  <rect x="100" y="210" width="200" height="140" rx="20" ry="20" fill="#0d0d0d" stroke="#f7c948" stroke-width="10"/>

  <!-- POT LID -->
  <rect x="90" y="193" width="220" height="28" rx="10" ry="10" fill="#0d0d0d" stroke="#f7c948" stroke-width="10"/>

  <!-- LID KNOB -->
  <rect x="182" y="170" width="36" height="28" rx="8" ry="8" fill="#0d0d0d" stroke="#f7c948" stroke-width="9"/>

  <!-- POT HANDLES -->
  <path d="M 100 240 Q 58 240 58 265 Q 58 290 100 290" fill="none" stroke="#f7c948" stroke-width="10" stroke-linecap="round"/>
  <path d="M 300 240 Q 342 240 342 265 Q 342 290 300 290" fill="none" stroke="#f7c948" stroke-width="10" stroke-linecap="round"/>

  <!-- STEAM lines above lid -->
  <path d="M 160 160 Q 150 140 160 120" fill="none" stroke="#f7c948" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <path d="M 200 155 Q 190 132 200 110" fill="none" stroke="#f7c948" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <path d="M 240 160 Q 230 140 240 120" fill="none" stroke="#f7c948" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- PAPER CROWN — lopsided, sitting on the knob, slightly tilted -->
  <g transform="rotate(-12, 200, 130)">
    <!-- Crown base band -->
    <rect x="155" y="112" width="96" height="16" rx="3" fill="#f7c948"/>
    <!-- Crown points — 3 uneven spikes for lopsided paper crown feel -->
    <polygon points="155,112 163,72 178,112" fill="#f7c948"/>
    <polygon points="191,112 200,60 209,112" fill="#f7c948"/>
    <polygon points="227,112 241,80 251,112" fill="#f7c948"/>
    <!-- Crown base bottom edge -->
    <rect x="155" y="122" width="96" height="6" rx="2" fill="#c8a800"/>
  </g>

</svg>
